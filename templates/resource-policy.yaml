apiVersion: v1
kind: ConfigMap
metadata:
  name: resource-policy
  namespace: trustee-operator-system
  annotations:
    argocd.argoproj.io/sync-wave: "4"
data:
  policy.rego: |
    package policy
    default allow = false
    allow if {
      input.submods.cpu0["ear.status"] == "affirming"
      gpu0_ok
    }
    gpu0_ok if {
          not input.submods.gpu0
        }

    gpu0_ok if {
      input.submods.gpu0["ear.status"] == "affirming"
    }